<svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <!-- BODY -->
    <rect x="28" y="40" width="44" height="60" fill="#22c55e" />
    <!-- Body Highlights / Shadows -->
    <rect x="58" y="40" width="14" height="60" fill="#15803d" />
    <rect x="32" y="40" width="8" height="60" fill="#86efac" />
    <rect x="34" y="40" width="3" height="60" fill="#ffffff" opacity="0.6" />
    <!-- Overhang Shadow -->
    <rect x="28" y="40" width="44" height="10" fill="#064e3b" opacity="0.35" />
    <!-- Body Outline -->
    <rect x="28" y="40" width="44" height="60" fill="none" stroke="#064e3b" stroke-width="4" stroke-linejoin="round" />

    <!-- LIP -->
    <rect x="18" y="15" width="64" height="26" rx="4" fill="#22c55e" />
    <clipPath id="lip-clip">
        <rect x="20" y="17" width="60" height="22" rx="2" />
    </clipPath>
    <g clip-path="url(#lip-clip)">
        <!-- Lip Highlights / Shadows -->
        <rect x="68" y="15" width="14" height="30" fill="#15803d" />
        <rect x="22" y="15" width="8" height="30" fill="#86efac" />
        <rect x="24" y="15" width="3" height="30" fill="#ffffff" opacity="0.6" />
    </g>
    <!-- Lip Outline -->
    <rect x="18" y="15" width="64" height="26" rx="4" fill="none" stroke="#064e3b" stroke-width="4" stroke-linejoin="round" />
</svg>
